name: Config Test - Execute Jupyter Notebooks
on:
  workflow_dispatch:
    inputs:  
      python-version:
        required: true
        type: string

  workflow_call:
    inputs:  
      python-version:
        required: true
        type: string
    secrets:
      CASJOBS_USERID:
        description: 'CASJOBS user ID'
        required: false
      CASJOBS_PW:
        description: 'CASJOBS password'
        required: false

env:
  CASJOBS_PW: ${{ secrets.CASJOBS_PW }}
  CASJOBS_USERID: ${{ secrets.CASJOBS_USERID }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Parse config
        id: parse-config
        run: |
          python -c "
          with open('ci_config.txt') as f:
              lines = f.readlines()
          config = {}
          for line in lines:
              if ':' in line:
                  key, value = line.split(':', 1)
                  config[key.strip()] = value.strip()
              else:
                  print(f'Warning: Skipping invalid line: {line.strip()}')
          import json
          with open('config.json', 'w') as f:
              json.dump(config, f)
          "
          # Output the file path for debugging (optional)
          echo "config_file=config.json" >> $GITHUB_OUTPUT

      - name: Get list of notebooks
        id: get-files
        run: |
          files=$(find notebooks -name "*.ipynb" | jq -cnR '[inputs | select(length>0)]')
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Generate matrix
        id: generate-matrix
        run: |
          files="${{ steps.get-files.outputs.files }}"

          # Parse ci_config.txt directly using jq to create a single JSON object from the mappings
          jq -R 'split("\n") | map(select(length > 0)) | map(split(":") | {(.[0]): .[1]}) | add' < ci_config.txt > config.json

          # Read config.json contents into a variable
          config_json=$(cat config.json)

          # Generate the matrix with the appropriate runner based on the config
          matrix=$(echo "$files" | jq -R --arg config_json "$config_json" 'split(",") | map({
            file: .,
            runner: (
              if ($config_json | fromjson)[.] == null then "ubuntu-latest"
              else ($config_json | fromjson)[.]
              end
            )
          })')

          # Echo the matrix as output in the expected format
          echo "matrix=$(echo $matrix | jq -c .)" >> $GITHUB_OUTPUT



  process-files:
    needs: prepare
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Jupyter
        run: |
          pip install jupyter nbconvert

      - name: Show runner details
        run: |
          echo "Processing ${{ matrix.file }}"
          echo "Runner configuration:"
          if [ "${{ matrix.runner }}" = "ubuntu-latest" ]; then
            echo "runs-on: ubuntu-latest"
          else
            echo "runs-on:"
            echo "  group: ${{ matrix.runner.group }}"
          fi
          
      - name: Install dependencies
        run: |
          echo "DEBUG ---"
          pwd
          echo "Path to req's: $(dirname ${{ matrix.file }})/requirements.txt"
          ls $(dirname ${{ matrix.notebook }})
          echo "---"
          
          if [ -f $(dirname "${{ matrix.file }}")/pre-requirements.sh ]; then
            chmod +x $(dirname "${{ matrix.file }}")/pre-requirements.sh
            ./$(dirname "${{ matrix.file }}")/pre-requirements.sh
          fi
          if [ -f $(dirname "${{ matrix.file }}")/pre-requirements.txt ]; then
            pip install -r $(dirname "${{ matrix.file }}")/pre-requirements.txt
          fi
          if [ -f pre-requirements.txt ]; then
            pip install -r pre-requirements.txt
            echo "Found Pre-Reqs"
          fi
          pip install -r $(dirname ${{ matrix.file }})/requirements.txt
          #pip install pytest
          #pip install nbval
          pip install nbconvert
          #pip install bandit
          pip install ipykernel
          
      - name: Execute Jupyter Notebook
        run: |
          export CASJOBS_PW="$CI_CASJOBS_PW"
          export CASJOBS_USERID="$CI_CASJOBS_USERID"
          echo "Executing ${{ matrix.file }} on runner: ${{ toJson(matrix.runner) }}"
          # Find the full path of the notebook and execute it
          notebook_path=$(find notebooks -name "${{ matrix.file }}")
          jupyter nbconvert --to notebook --execute "$notebook_path" --output "${{ matrix.file }}"


